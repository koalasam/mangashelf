<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MangaShelf{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --surface2: #1e1e2e;
    --border: #2a2a3e;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #e8e8f0;
    --text-muted: #6e6e8a;
    --success: #4ade80;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    font-size: 15px;
  }
  a { color: inherit; text-decoration: none; }

  /* Nav */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    height: 58px;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-right: 2.5rem;
    white-space: nowrap;
  }
  .nav-links {
    display: flex;
    gap: 0.2rem;
    flex: 1;
  }
  .nav-link {
    padding: 0.4rem 1rem;
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 0.88rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: color 0.2s, background 0.2s;
  }
  .nav-link:hover, .nav-link.active {
    color: var(--text);
    background: var(--surface2);
  }
  .nav-user {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-left: auto;
  }
  .nav-username {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-family: 'Space Mono', monospace;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1.1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #c73750; }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8rem; }

  /* Page container */
  .page { max-width: 1400px; margin: 0 auto; padding: 2rem 2rem; }

  /* Cards */
  .cover-card {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface2);
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: block;
  }
  .cover-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  }
  .cover-card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }
  .cover-card .cover-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 3rem;
  }
  .cover-card .card-label {
    padding: 0.6rem 0.75rem;
    font-size: 0.82rem;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .cover-card .card-meta {
    padding: 0 0.75rem 0.6rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.06em;
    color: var(--text);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .grid-covers {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1.2rem;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 0.9rem 1.4rem;
    border-radius: 8px;
    font-size: 0.88rem;
    z-index: 9999;
    animation: slideIn 0.3s ease;
    max-width: 320px;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    font-family: 'Space Mono', monospace;
  }
  .badge-accent { background: var(--accent); color: #fff; }
  .badge-muted { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
</style>
{% block head %}{% endblock %}
</head>
<body>
{% if session.username %}
<nav>
  <span class="nav-logo">📖 MangaShelf</span>
  <div class="nav-links">
    <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Home</a>
    <a href="{{ url_for('library') }}" class="nav-link {% if request.endpoint == 'library' %}active{% endif %}">Library</a>
    {% if session.role == 'admin' %}
    <a href="{{ url_for('admin') }}" class="nav-link {% if request.endpoint == 'admin' %}active{% endif %}">Admin</a>
    {% endif %}
  </div>
  <div class="nav-user">
    <span class="nav-username">{{ username }}</span>
    <a href="{{ url_for('logout') }}" class="btn btn-ghost btn-sm">Sign Out</a>
  </div>
</nav>
{% endif %}
{% block content %}{% endblock %}
<script>
function showToast(msg, color) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  if (color) t.style.borderLeftColor = color;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
